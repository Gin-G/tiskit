name: build-and-deploy

on:
  push:
    branches: [main]
    # Avoid an infinite loop: the bump-back commit only touches values.yaml.
    paths-ignore:
      - 'chart/tiskit/values.yaml'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  IMAGE_NAME: tiskit

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      repo: ${{ steps.meta.outputs.repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image metadata
        id: meta
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          tag="sha-${short_sha}"
          repo="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          provenance: true
          sbom: true
          tags: |
            ${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-chart:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        env:
          NEW_TAG: ${{ needs.build.outputs.tag }}
          NEW_REPO: ${{ needs.build.outputs.repo }}
        run: |
          set -euo pipefail
          file="chart/tiskit/values.yaml"
          # Replace `tag: "..."` on the line under `image:` and the repository line.
          python - <<'PY'
          import os, re, pathlib, sys
          path = pathlib.Path("chart/tiskit/values.yaml")
          text = path.read_text()
          new_tag = os.environ["NEW_TAG"]
          new_repo = os.environ["NEW_REPO"]
          text = re.sub(r'(\n  repository:\s*)"[^"]*"', f'\\1"{new_repo}"', text, count=1)
          text = re.sub(r'(\n  tag:\s*)"[^"]*"', f'\\1"{new_tag}"', text, count=1)
          path.write_text(text)
          PY
          git diff -- "$file" || true

      - name: Commit and push bump
        env:
          NEW_TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- chart/tiskit/values.yaml; then
            echo "No image change to commit."
            exit 0
          fi
          git add chart/tiskit/values.yaml
          git commit -m "chore(chart): bump image to ${NEW_TAG} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
