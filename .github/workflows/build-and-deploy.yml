name: build-and-deploy

on:
  push:
    branches: [main]
    # Avoid an infinite loop: the bump-back commit only touches values.yaml.
    paths-ignore:
      - 'chart/tiskit/values.yaml'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  IMAGE_NAME: tiskit

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image tag
        id: meta
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # The image repo is built here from a secret. We do NOT expose it as a job
      # output — GitHub masks outputs that contain secret values to empty, which
      # was breaking the chart bump (repository: "").
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          provenance: true
          sbom: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-chart:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        env:
          NEW_TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("chart/tiskit/values.yaml")
          text = path.read_text()
          new_tag = os.environ["NEW_TAG"]
          # Match the first `  tag: "..."` under the top-level `image:` block.
          text, n = re.subn(r'(\n  tag:\s*)"[^"]*"', f'\\1"{new_tag}"', text, count=1)
          if n == 0:
              raise SystemExit("Failed to locate image.tag in values.yaml")
          path.write_text(text)
          PY
          git diff -- chart/tiskit/values.yaml || true

      - name: Commit and push bump
        env:
          NEW_TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- chart/tiskit/values.yaml; then
            echo "No image change to commit."
            exit 0
          fi
          git add chart/tiskit/values.yaml
          git commit -m "chore(chart): bump image to ${NEW_TAG} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
