apiVersion: v1
kind: Service
metadata:
  name: {{ include "tiskit.fullname" . }}
  labels: {{- include "tiskit.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "tiskit.selectorLabels" . | nindent 4 }}
