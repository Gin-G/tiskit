apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tiskit.fullname" . }}
  labels: {{- include "tiskit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {{- include "tiskit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "tiskit.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: tiskit
    spec:
      serviceAccountName: {{ include "tiskit.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "tiskit.selectorLabels" . | nindent 14 }}
      containers:
        - name: tiskit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: MAX_UPLOAD_BYTES
              value: {{ .Values.maxUploadBytes | int64 | quote }}
            {{- with .Values.app.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.app.extraEnvFrom }}
          envFrom: {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/tiskit
      volumes:
        # tmpfs-backed so PDF buffers never hit disk if something asks for /tmp.
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: home
          emptyDir:
            medium: Memory
            sizeLimit: 8Mi
