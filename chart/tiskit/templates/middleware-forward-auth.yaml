{{- if and .Values.traefik.enabled .Values.traefik.middlewares.forwardAuth .Values.oauth2Proxy.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "tiskit.fullname" . }}-forward-auth
  labels: {{- include "tiskit.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: http://{{ include "tiskit.oauth2.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.oauth2Proxy.port }}/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Groups
      - Authorization
{{- end }}
